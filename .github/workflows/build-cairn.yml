name: Build Cairn App for iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.3'

      # xcodebuild can build directly from a Package.swift file
      - name: Compile Cairn iOS App
        run: |
          xcodebuild build \
            -scheme Cairn \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Package App into installable .ipa
        run: |
          mkdir -p Payload
          mv ./DerivedData/Build/Products/Debug-iphoneos/Cairn.app Payload/
          zip -r Cairn.ipa Payload/

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Cairn-App-Installable
          path: Cairn.ipa
