name: Build Cairn App for iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      # MODIFIED THIS STEP
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # <-- THIS IS THE CRITICAL CHANGE

      # WE HAVE DELETED THE MANUAL "Install Git LFS" STEP

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.3'

      - name: Compile Cairn iOS App
        run: |
          xcodebuild build \
            -scheme Cairn \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData

      - name: Package App into installable .ipa
        run: |
          mkdir -p Payload
          mv ./DerivedData/Build/Products/Debug-iphoneos/Cairn.app Payload/
          zip -r Cairn.ipa Payload/

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Cairn-App-Installable
          path: Cairn.ipa
