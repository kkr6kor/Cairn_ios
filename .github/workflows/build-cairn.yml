name: Build Cairn App for iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.3'

      # YOUR EXCELLENT FIX: Force Git to use the GITHUB_TOKEN for authentication
      - name: Force Git to use GitHub Token
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Resolve Swift Package Dependencies
        run: xcodebuild -resolvePackageDependencies -scheme Cairn -derivedDataPath ./DerivedData

      - name: Compile Cairn iOS App
        run: |
          xcodebuild build \
            -scheme Cairn \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData

      - name: Package App into installable .ipa
        run: |
          mkdir -p Payload
          mv ./DerivedData/Build/Products/Debug-iphoneos/Cairn.app Payload/
          zip -r Cairn.ipa Payload/

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Cairn-App-Installable
          path: Cairn.ipa
