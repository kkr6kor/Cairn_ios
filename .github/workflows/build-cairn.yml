name: Build Cairn App for iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.3'

      # STEP FROM YOUR FIX #2: De-authenticate Git to allow anonymous clones
      - name: Unset interfering Git credentials
        run: |
          git config --global --unset-all credential.helper || true
          git config --global --unset-all http.https://github.com/.extraheader || true

      # STEP FROM YOUR FIX #3: Resolve packages as a separate step
      - name: Resolve Swift Package Dependencies
        run: xcodebuild -resolvePackageDependencies -scheme Cairn -derivedDataPath ./DerivedData

      # The original compile step, which now runs after dependencies are confirmed
      - name: Compile Cairn iOS App
        run: |
          xcodebuild build \
            -scheme Cairn \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData

      - name: Package App into installable .ipa
        run: |
          mkdir -p Payload
          mv ./DerivedData/Build/Products/Debug-iphoneos/Cairn.app Payload/
          zip -r Cairn.ipa Payload/

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Cairn-App-Installable
          path: Cairn.ipa
