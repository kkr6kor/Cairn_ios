name: Build Cairn App for iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.3'

      # NEW STEP: Based on your analysis to clear stale data
      - name: Clear Swift Package Caches
        run: rm -rf ~/Library/Caches/org.swift.swiftpm

      - name: Compile Cairn iOS App
        run: |
          xcodebuild build \
            -scheme Cairn \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData

      - name: Package App into installable .ipa
        run: |
          mkdir -p Payload
          mv ./DerivedData/Build/Products/Debug-iphoneos/Cairn.app Payload/
          zip -r Cairn.ipa Payload/

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Cairn-App-Installable
          path: Cairn.ipa
