projectVersion: 15.0

name: Cairn
options:
  bundleIdPrefix: com.cairn
packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire
    from: 5.0.0
targets:
  Cairn:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Cairn
    # ADD THIS SETTINGS BLOCK
    settings:
      base:
        FIND_BITCODE: "NO"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        SWIFT_STRICT_CONCURRENCY: "targeted"
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies:
      - package: Alamofire
  CairnTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CairnTests
    dependencies:
      - target: Cairn
