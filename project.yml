projectVersion: 15.0

name: Cairn
options:
  bundleIdPrefix: com.cairn
packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire
    from: 5.0.0
targets:
  Cairn:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Cairn
    dependencies:
      - package: Alamofire
        product: Alamofire
        copy: false
  CairnTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CairnTests
    dependencies:
      - target: Cairn
