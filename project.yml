name: Cairn
options:
  bundleIdPrefix: com.cairn
packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire
    from: 5.0.0
targets:
  Cairn:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Cairn
    dependencies:
      - package: Alamofire
    # THIS IS THE NEW, CRITICAL SECTION
    preBuildScripts:
      - script: "echo 'Overriding default bundle copy phase to prevent error'"
        name: "Disable Faulty Bundle Copy"
        basedOnDependency: "Alamofire"
  CairnTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CairnTests
    dependencies:
      - target: Cairn
